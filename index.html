<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Memories</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow-x: hidden;
}

/* HEADER */
header {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  animation: fadeIn 2s ease;
}

header h1 {
  font-size: 3rem;
}

header p {
  opacity: 0.7;
}

/* MEMORY CARDS */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
}

.card p {
  padding: 10px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 80%;
}

/* TIMELINE */
.timeline {
  padding: 40px;
}

.timeline div {
  background: rgba(255,255,255,0.05);
  margin: 15px 0;
  padding: 15px;
  border-radius: 10px;
  animation: slideUp 1s ease;
}

/* MESSAGES */
.messages {
  padding: 40px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  background: #ec4899;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.message-box {
  margin-top: 10px;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 8px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0}
  to {opacity:1}
}

@keyframes slideUp {
  from {transform:translateY(30px); opacity:0}
  to {transform:translateY(0); opacity:1}
}
</style>
</head>

<body>

<header>
  <h1>🎓 Our College Memories</h1>
  <p>3 Years. Countless Memories ❤️</p>
</header>

<!-- MEMORY CARDS -->
<section class="gallery">
  <div class="card" onclick="openModal('photo1.jpg')">
    <img src="photo1.jpg">
    <p>First Day 😅</p>
  </div>

  <div class="card" onclick="openModal('photo2.jpg')">
    <img src="photo2.jpg">
    <p>Best Moments 🔥</p>
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<!-- TIMELINE -->
<section class="timeline">
  <h2>📅 Our Journey</h2>
  <div>📘 First Year – New beginnings</div>
  <div>🔥 Second Year – Fun & chaos</div>
  <div>💔 Final Year – Emotional goodbye</div>
</section>

<!-- MESSAGES -->
<section class="messages">
  <h2>💬 Leave a Message</h2>

  <input id="name" placeholder="Your name">
  <textarea id="msg" placeholder="Write something..."></textarea>
  <button onclick="addMessage()">Send</button>

  <div id="messageList"></div>
</section>

<script>
function openModal(src) {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modalImg').src = src;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function addMessage() {
  let name = document.getElementById('name').value;
  let msg = document.getElementById('msg').value;

  if(name && msg) {
    let box = document.createElement('div');
    box.className = 'message-box';
    box.innerHTML = "<b>" + name + ":</b> " + msg;

    document.getElementById('messageList').appendChild(box);

    document.getElementById('name').value = "";
    document.getElementById('msg').value = "";
  }
}
</script>

</body>
</html>
